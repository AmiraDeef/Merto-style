<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MERTO</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css//style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

 <nav class="navbar bg-white border-bottom py-5 px-3">
  <div class="container-fluid mx-5">
    <div class="row w-100 align-items-center g-0">

      <div class="col-2">
        <img src="/images/logo.png" class="img-fluid w-50" alt="Merto">
      </div>

      <div class="col-2 d-flex align-items-center gap-2">
        <i class="bi bi-telephone fs-3"></i>
        <!-- <i class="fa-solid fa-phone fs-4"></i> -->
        <div class="lh-1 m-1">
          <small class="fs-5 mb-1">Contact us 24/7</small>
          <div class="fw-bold text-nowrap fs-5">(+92) 3942 7879</div>
        </div>
      </div>

     
      <div class="col-4">
        <div class="input-group rounded overflow-hidden mx-auto">
          <select class="form-select bg-light border-0 py-3">
            <option selected>All Categories</option>
            <option>Autopart</option>
            <option>Car Care</option>
            <option>Equipment</option>
          </select>
          <input type="text" class="form-control bg-light border-0 border-start w-50 " placeholder="Search for products">
          <button class="btn btn-dark rounded ">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </div>

      
      <div class="col-4 d-flex justify-content-end align-items-center gap-3">

       
        <div class="d-flex align-items-center gap-1">
          <img src="https://flagcdn.com/w20/us.png" alt="USA">
          <select class="form-select form-select-sm border-0 bg-transparent">
            <option selected>English</option>
            <option>Arabic</option>
          </select>
          <select class="form-select form-select-sm border-0 bg-transparent">
            <option selected>USD</option>
          </select>
        </div>

      
        <div class="d-flex align-items-center gap-2 fw-semibold">
          <i class="fa-regular fa-user fs-5"></i>
          <span>Account</span>
        </div>

    
        <div class="d-flex gap-3">
          <div class="position-relative">
            <i class="fa-regular fa-heart fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-circle bg-danger">
              0
            </span>
          </div>

          <div class="position-relative">
            <i class="bi bi-cart2 fs-5"></i>
            <!-- <i class="fa-solid fa-cart-shopping fs-5"></i> -->
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-circle bg-danger">
              0
            </span>
          </div>
        </div>

      </div>

    </div>
  </div>
</nav>


  <script src="./js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
